<svg width="560" height="130" viewBox="0 0 560 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .panelbg { fill: #26214a; }
      .title { font-family: 'Verdana', sans-serif; font-size: 16px; font-weight: bold; fill: #F3C8DD; }
      .desc { font-family: 'Verdana', sans-serif; font-size: 12px; fill: #D5C5C8; }
      .meta { font-family: 'Verdana', sans-serif; font-size: 11px; fill: #D183A9; }
    </style>
  </defs>
  <rect width="560" height="130" rx="12" class="panelbg"/>
  <rect x="0" y="0" width="6" height="130" fill="#71557A"/>
  <text x="28" y="34" class="title">Spelling Bee</text>
  <text x="28" y="58" class="desc">Real-time multiplayer spelling competition app built</text>
  <text x="28" y="74" class="desc">with Nuxt.js and Appwrite.</text>
  <circle cx="32" cy="100" r="4" fill="#71557A"/>
  <text x="44" y="104" class="meta">Nuxt.js</text>
  <circle cx="120" cy="100" r="4" fill="#D183A9"/>
  <text x="132" y="104" class="meta">Realtime</text>
</svg>
