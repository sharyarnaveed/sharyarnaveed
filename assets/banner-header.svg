<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26214a"/>
      <stop offset="40%" stop-color="#3A345B"/>
      <stop offset="75%" stop-color="#71557A"/>
      <stop offset="100%" stop-color="#D183A9"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D183A9" stop-opacity="0"/>
      <stop offset="30%" stop-color="#D183A9" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#F3C8DD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F3C8DD" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .doto-name { font-family: 'Courier New', monospace; font-size: 52px; font-weight: 900; fill: #F3C8DD; letter-spacing: 6px; }
      .doto-role { font-family: 'Courier New', monospace; font-size: 14px; letter-spacing: 8px; fill: #D183A9; font-weight: 700; }
      .quote { font-family: 'Georgia', serif; font-style: italic; font-size: 13px; fill: #F3C8DD; opacity: 0.75; }
      .sig { font-family: 'Georgia', serif; font-style: italic; font-size: 12px; fill: #D183A9; opacity: 0.7; }
      .dot-pulse { animation: pulse 3s ease-in-out infinite; }
      .dot-float { animation: float 4s ease-in-out infinite; }
      .shimmer { animation: shimmer 4s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity:0.4; r:2; } 50% { opacity:1; r:3.5; } }
      @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
      @keyframes shimmer { 0%,100% { opacity:0.3; } 50% { opacity:0.9; } }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>

  <!-- Grid dots pattern -->
  <g opacity="0.12">
    <circle cx="80" cy="40" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:0s"/>
    <circle cx="160" cy="70" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:0.4s"/>
    <circle cx="240" cy="30" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:0.8s"/>
    <circle cx="320" cy="60" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:1.2s"/>
    <circle cx="400" cy="25" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:0.3s"/>
    <circle cx="480" cy="55" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:0.7s"/>
    <circle cx="560" cy="35" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:1.1s"/>
    <circle cx="640" cy="65" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:0.2s"/>
    <circle cx="720" cy="28" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:0.6s"/>
    <circle cx="800" cy="50" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:1.0s"/>
    <circle cx="880" cy="38" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:0.5s"/>
    <circle cx="960" cy="62" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:0.9s"/>
    <circle cx="1040" cy="42" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:1.3s"/>
    <circle cx="1120" cy="55" r="1.5" fill="#F3C8DD" class="dot-pulse" style="animation-delay:0.1s"/>
  </g>

  <!-- Glowing orb top right -->
  <circle cx="1120" cy="65" r="50" fill="#D183A9" opacity="0.12" filter="url(#softGlow)"/>
  <circle cx="1120" cy="65" r="28" fill="#F3C8DD" opacity="0.18"/>
  <circle cx="1120" cy="65" r="12" fill="#F3C8DD" opacity="0.55"/>

  <!-- Secondary orb -->
  <circle cx="80" cy="200" r="38" fill="#71557A" opacity="0.15" filter="url(#softGlow)"/>

  <!-- Shimmer line -->
  <rect x="0" y="160" width="1200" height="1" fill="url(#glowLine)" class="shimmer"/>

  <!-- Left accent bar -->
  <rect x="60" y="90" width="4" height="80" rx="2" fill="#D183A9" opacity="0.8"/>

  <!-- Main text -->
  <text x="80" y="82" class="doto-role">SHARYAR NAVEED</text>
  <text x="78" y="140" class="doto-name" filter="url(#glow)">WEB DEVELOPER</text>
  <text x="78" y="165" class="doto-role" style="letter-spacing:4px; font-size:12px; fill:#F3C8DD; opacity:0.7;">CREATIVE · FULL-STACK · PRODUCT-FOCUSED</text>

  <text x="80" y="205" class="quote">"Good products are built quietly, with care,</text>
  <text x="80" y="222" class="quote">one small decision at a time."</text>
  <text x="80" y="248" class="sig">— Sharyar</text>

  <!-- Bottom waves -->
  <path d="M0,320 L0,240 Q150,185 320,225 Q480,260 620,200 Q760,145 900,210 Q1050,255 1200,195 L1200,320 Z" fill="#4B1535" opacity="0.55"/>
  <path d="M0,320 L0,272 Q200,228 400,268 Q600,300 800,258 Q1000,220 1200,262 L1200,320 Z" fill="#3A345B" opacity="0.8"/>
  <path d="M0,320 L0,295 Q250,278 500,298 Q750,314 1000,290 Q1100,278 1200,292 L1200,320 Z" fill="#26214a"/>
</svg>
