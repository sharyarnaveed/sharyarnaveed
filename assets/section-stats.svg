<svg width="1200" height="60" viewBox="0 0 1200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sectionBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4B1535"/>
      <stop offset="50%" stop-color="#71557A"/>
      <stop offset="100%" stop-color="#26214a"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F3C8DD"/>
      <stop offset="100%" stop-color="#D183A9"/>
    </linearGradient>
    <style>
      .label { font-family: 'Courier New', monospace; font-size: 16px; letter-spacing: 8px; fill: #F3C8DD; font-weight: 900; }
      .shimmer { animation: shimmer 3s ease-in-out infinite; }
      @keyframes shimmer { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
    </style>
  </defs>
  <rect width="1200" height="60" fill="url(#sectionBg)"/>
  <rect x="0" y="0" width="1200" height="2" fill="url(#accentLine)" class="shimmer"/>
  <rect x="0" y="0" width="6" height="60" fill="#F3C8DD"/>
  <circle cx="26" cy="30" r="3" fill="#F3C8DD" opacity="0.8"/>
  <circle cx="38" cy="30" r="2" fill="#D183A9" opacity="0.5"/>
  <text x="58" y="37" class="label">GITHUB STATS</text>
  <rect x="1140" y="24" width="40" height="2" rx="1" fill="#F3C8DD" opacity="0.4"/>
  <rect x="1100" y="24" width="30" height="2" rx="1" fill="#D183A9" opacity="0.3"/>
  <rect x="0" y="58" width="1200" height="2" fill="#26214a"/>
</svg>
